<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Start</title>
    <style>
        :root {
            /* Catppuccin Mocha Palette */
            --bg-color: #1e1e2e;          /* Base */
            --card-bg: #252538;           /* Mantle */
            --input-bg: #181825;          /* Crust */
            --text-color: #cdd6f4;        /* Text */
            --accent-color: #a6adc8;      /* Subtext0 */
            --border-color: #313244;      /* Surface0 */
            --hover-bg: #45475a;          /* Surface1 */
        }

        @media (prefers-color-scheme: light) {
            :root {
                /* Catppuccin Latte Palette */
                --bg-color: #eff1f5;      /* Base */
                --card-bg: #e6e9ef;       /* Mantle */
                --input-bg: #dce0e8;      /* Crust */
                --text-color: #4c4f69;    /* Text */
                --accent-color: #6c6f85;  /* Subtext0 */
                --border-color: #ccd0da;  /* Surface0 */
                --hover-bg: #acb0be;      /* Surface1 */
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            
            /* 绝对居中引擎 */
            display: flex;
            align-items: center;
            justify-content: center;
            
            min-height: 100vh;
            padding: calc(40px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
            
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            width: 100%;
            max-width: 600px; /* 紧凑视区 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 36px;
            margin: auto 0; 
        }

        #time {
            font-size: 3.8rem;
            font-weight: 300;
            letter-spacing: -1px;
            color: var(--text-color);
            user-select: none;
            opacity: 0.95;
        }

        .search-box {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border-radius: 12px;
            padding: 2px;
            border: 1px solid var(--border-color);
        }

        .search-select {
            background: none;
            border: none;
            color: var(--accent-color);
            padding: 0 16px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            height: 44px;
            -webkit-appearance: none;
        }

        .search-input {
            flex: 1;
            height: 44px;
            background: none;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1rem;
            font-family: inherit;
            padding: 0 14px;
            -webkit-appearance: none;
        }

        /* 响应式纯文本网格 */
        .links-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            /* 保证移动端点击热区，同时兼顾纯文字卡片的精细度 */
            padding: 16px 4px; 
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--card-bg);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.1s ease;
            cursor: pointer;
            touch-action: manipulation;
            border: 1px solid var(--border-color);
        }

        .link-item:hover, .link-item:active {
            background-color: var(--hover-bg);
            transform: scale(0.96);
        }

        .link-title {
            font-size: 0.82rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
            opacity: 0.9;
            text-align: center;
        }

        /* 抽屉结构 */
        .more-links-container {
            width: 100%;
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.22s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        .more-links-container.expanded {
            grid-template-rows: 1fr;
        }

        .more-links-inner {
            min-height: 0;
        }

        .toggle-btn {
            width: 100%;
            max-width: 140px;
            padding: 10px;
            margin: 4px auto 0 auto;
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            outline: none;
            touch-action: manipulation;
        }

        .toggle-icon {
            width: 10px;
            height: 10px;
            fill: currentColor;
            transition: transform 0.2s ease;
        }

        .expanded .toggle-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="time">00:00</div>

        <div class="search-box">
            <select class="search-select" id="engineSelect">
                <option value="https://www.google.com/search?q=">Ggl</option>
                <option value="https://www.bing.com/search?q=">Bng</option>
                <option value="https://www.baidu.com/s?wd=">Bdu</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off" inputmode="search">
        </div>

        <div class="links-grid" id="featuredGrid"></div>

        <div class="more-links-container" id="moreContainer">
            <div class="more-links-inner">
                <div class="links-grid" id="moreGrid"></div>
            </div>
        </div>

        <button class="toggle-btn" id="toggleBtn">
            <span>More</span>
            <svg class="toggle-icon" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </button>
    </div>

    <script>
        // 1. 时钟
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. 搜索
        const searchInput = document.getElementById('searchInput');
        const engineSelect = document.getElementById('engineSelect');
        if (!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            searchInput.focus();
        }
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim() !== '') {
                window.location.href = engineSelect.value + encodeURIComponent(searchInput.value.trim());
            }
        });

        // 3. 纯文本数据集结构
        const configLinks = [
            // 前 8 个常驻
            { name: 'X', url: 'https://x.com' },
            { name: 'Grok', url: 'https://grok.com' },
            { name: 'Threads', url: 'https://www.threads.net' },
            { name: 'Instagram', url: 'https://www.instagram.com' },
            { name: 'Google', url: 'https://www.google.com' },
            { name: 'Reddit', url: 'https://www.reddit.com' },
            { name: 'Telegram', url: 'https://web.telegram.org' },
            { name: 'Outlook', url: 'https://outlook.live.com' },

            // 其余折叠
            { name: 'WeChat', url: 'https://wx.qq.com' },
            { name: 'ChatGPT', url: 'https://chatgpt.com' },
            { name: 'Gemini', url: 'https://gemini.google.com' },
            { name: 'Notion', url: 'https://www.notion.so' },
            { name: 'YouTube', url: 'https://www.youtube.com' },
            { name: 'Bilibili', url: 'https://www.bilibili.com' },
            { name: '小红书', url: 'https://www.xiaohongshu.com' },
            { name: 'Discord', url: 'https://discord.com' },
            { name: 'Bluesky', url: 'https://bsky.app' },
            { name: 'Pinterest', url: 'https://www.pinterest.com' },
            { name: 'Midjourney', url: 'https://www.midjourney.com' },
            { name: 'NotionCal', url: 'https://calendar.notion.so' },
            { name: 'GoogleCal', url: 'https://calendar.google.com' },
            { name: 'TickTick', url: 'https://ticktick.com' },
            { name: 'Craft', url: 'https://www.craft.do' },
            { name: 'Logseq', url: 'https://logseq.com' },
            { name: 'Flomo', url: 'https://flomoapp.com' },
            { name: 'Raycast', url: 'https://www.raycast.com' },
            { name: 'OneDrive', url: 'https://onedrive.live.com' },
            { name: 'Lark', url: 'https://www.feishu.cn' },
            { name: 'Loop', url: 'https://loop.microsoft.com' },
            { name: 'Gmail', url: 'https://mail.google.com' },
            { name: 'Mail163', url: 'https://mail.163.com' },
            { name: 'YTMusic', url: 'https://music.youtube.com' },
            { name: 'Spotify', url: 'https://open.spotify.com' },
            { name: '小宇宙', url: 'https://www.xiaoyuzhoufm.com' },
            { name: 'Behance', url: 'https://www.behance.net' },
            { name: 'Slack', url: 'https://slack.com' }
        ];

        // 4. 文本渲染
        const featuredLinks = configLinks.slice(0, 8);
        const moreLinks = configLinks.slice(8);

        const renderMapper = link => `
            <a class="link-item" href="${link.url}" target="_blank" rel="noopener noreferrer">
                <div class="link-title">${link.name}</div>
            </a>
        `;

        document.getElementById('featuredGrid').innerHTML = featuredLinks.map(renderMapper).join('');
        document.getElementById('moreGrid').innerHTML = moreLinks.map(renderMapper).join('');

        // 5. 折屉交互
        const toggleBtn = document.getElementById('toggleBtn');
        const moreContainer = document.getElementById('moreContainer');
        const btnText = toggleBtn.querySelector('span');

        toggleBtn.addEventListener('click', () => {
            const isExpanded = moreContainer.classList.toggle('expanded');
            toggleBtn.classList.toggle('expanded', isExpanded);
            btnText.textContent = isExpanded ? 'Less' : 'More';
        });
    </script>
</body>
</html>
